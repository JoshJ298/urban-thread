<!DOCTYPE html>
<html>

<head>
<title>UrbanThread</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>UrbanThread</h1>

<nav>
<a href="index.html">Home</a>
<a href="men.html">Men</a>
<a href="women.html">Women</a>
<a href="accessories.html">Accessories</a>
<a href="cart.html">Cart</a>
<a href="login.html">Login</a>
<a href="register.html">Register</a>
</nav>
</header>

<section class="hero">
    <div class="hero-content right">
        <h2>Modern Urban Fashion</h2>
        <p>Shop the latest streetwear styles</p>

        <div class="hero-buttons">
            <a class="btn btn-primary" href="men.html">Shop Men</a>
            <a class="btn btn-primary" href="women.html">Shop Women</a>
             <a class="btn btn-primary" href="accessories.html">Shop Accessories</a>
        </div>
    </div>
</section>

<script>

const translations = {
    en: {
        home: "Home",
        men: "Men",
        women: "Women",
        accessories: "Accessories",
        cart: "Cart",
        login: "Login",
        register: "Register",
        search: "Search products...",
        checkout: "Checkout",
        placeOrder: "Place Order"
    },
    es: {
        home: "Inicio",
        men: "Hombre",
        women: "Mujer",
        accessories: "Accesorios",
        cart: "Carrito",
        login: "Iniciar sesión",
        register: "Registrarse",
        search: "Buscar productos...",
        checkout: "Pagar",
        placeOrder: "Realizar pedido"
    }
};

function setLanguage(lang) {
    localStorage.setItem("lang", lang);
    applyLanguage(lang);
}

function applyLanguage(lang) {
    const t = translations[lang];

    // Navbar
    const navLinks = document.querySelectorAll("nav a");
    if (navLinks[0]) navLinks[0].textContent = t.home;
    if (navLinks[1]) navLinks[1].textContent = t.men;
    if (navLinks[2]) navLinks[2].textContent = t.women;
    if (navLinks[3]) navLinks[3].textContent = t.accessories;

    if (document.getElementById("nav-cart"))
        document.getElementById("nav-cart").textContent = t.cart;

    if (document.getElementById("nav-login"))
        document.getElementById("nav-login").textContent = t.login;

    if (document.getElementById("nav-register"))
        document.getElementById("nav-register").textContent = t.register;

    // Search bar
    if (document.getElementById("search"))
        document.getElementById("search").placeholder = t.search;

    // Page titles (if exist)
    if (document.querySelector(".title"))
        document.querySelector(".title").textContent = t.men;

    if (document.querySelector(".checkout-title"))
        document.querySelector(".checkout-title").textContent = t.checkout;

    // Buttons
    document.querySelectorAll("[data-translate]").forEach(el => {
        const key = el.getAttribute("data-translate");
        if (t[key]) el.textContent = t[key];
    });
}


const savedLang = localStorage.getItem("lang") || "en";
applyLanguage(savedLang);

</script>

</body>
</html>
