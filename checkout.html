<!DOCTYPE html>
<html>

<head>

    
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="screen">

<header>
<h1>UrbanThread</h1>

<nav>
<a href="index.html">Home</a>
<a href="men.html">Men</a>
<a href="women.html">Women</a>
<a href="accessories.html">Accessories</a>
<a href="cart.html" id="nav-cart">Cart</a>
<a href="login.html" id="nav-login">Login</a>
<a href="register.html" id="nav-register">Register</a>
</nav>

</header>

<h2 class="title">Checkout</h2>

<div class="checkout-container">


<form id="checkout-form">

<h3>Delivery Details</h3>

<input type="text" id="name" placeholder="Full Name" required>
<input type="text" id="address" placeholder="Address" required>
<input type="text" id="city" placeholder="City" required>
<input type="text" id="postcode" placeholder="Postcode" required>

<button type="submit">Place Order</button>

</form>



<div class="order-summary">

<h3>Your Order</h3>

<div id="order-items"></div>

<h3 id="order-total">Total: £0</h3>

</div>

</div>


<script>
document.addEventListener("DOMContentLoaded", function(){

fetch("https://urbanthread-backend.onrender.com");

const cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("order-items");
let total = 0;

if(cart.length === 0){
    container.innerHTML = "<p>Your cart is empty</p>";
} else {
    cart.forEach(item => {
        const div = document.createElement("div");
        const subtotal = item.price * item.quantity;

        div.innerHTML = `<p>${item.name} (x${item.quantity}) - £${subtotal}</p>`;
        container.appendChild(div);

        total += subtotal;
    });
}

document.getElementById("order-total").innerText = "Total: £" + total;

document.getElementById("checkout-form").addEventListener("submit", async function(e){
    e.preventDefault();

    if(cart.length === 0){
        alert("Your cart is empty");
        return;
    }

    try {
        const res = await fetch("https://urbanthread-backend.onrender.com/create-checkout-session", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ items: cart })
        });

        const data = await res.json();

        if(data.url){
            window.location.href = data.url;
        } else {
            alert("Stripe error");
        }

    } catch (err){
        alert("Backend not reachable");
    }
});

});
</script>

</body>
</html>
