<style>
.lang-btn {
    margin-left: 10px;
    padding: 6px 12px;
    background: #5a51d1;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.lang-btn:hover {
    background: lightblue;
}

.filter-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 30px;
}

#categoryFilter, #search {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}


.product-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 20px 80px;
}

.product-card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    transition: 0.2s;
}

.product-card:hover {
    transform: translateY(-5px);
}


.product-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
    margin-bottom: 10px;
}

.product-card button {
    background: rgb(37, 37, 107);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
}

.product-card button:hover {
    background: light;
}
</style>

</head>

<script>


document.querySelectorAll(".product-card").forEach((card, index) => {

    
    const productIds = [1,5,13,12,1,3,12,7]; 
    

    const button = card.querySelector("button");

    if(button){
        button.addEventListener("click", (e) => {
            e.preventDefault(); 

            const id = productIds[index];

            fetch("http://127.0.0.1:5000/cart/add", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    product_id: id,
                    quantity: 1
                })
            })
            .then(() => alert("Added to cart"));
        });
    }

});
</script>

<script>
const searchInput = document.getElementById("search");
const categoryFilter = document.getElementById("categoryFilter");
const productCards = document.querySelectorAll(".product-card");

function filterProducts() {
    const query = searchInput.value.toLowerCase();
    const selectedCategory = categoryFilter.value;

    productCards.forEach(card => {
        const title = card.querySelector("h3").textContent.toLowerCase();
        const category = card.getAttribute("data-category");

        const matchSearch = title.includes(query);
        const matchCategory = selectedCategory === "all" || category === selectedCategory;

        card.style.display = (matchSearch && matchCategory) ? "" : "none";
    });
}

searchInput.addEventListener("input", filterProducts);
categoryFilter.addEventListener("change", filterProducts);
</script>


<script>
const translations = {
    en: {
        title: "Men's Collection",
        search: "Search products...",
        cart: "Cart",
        login: "Login",
        register: "Register",
        view: "View",

        hoodie: "Graphic Hoodie",
        jacket: "Denim Jacket",

    es: {
        title: "Colección de Hombre",
        search: "Buscar productos...",
        cart: "Carrito",
        login: "Iniciar sesión",
        register: "Registrarse",
        view: "Ver",

        hoodie: "Sudadera Gráfica",
        jacket: "Chaqueta Vaquera",
        cargo: "Pantalones Cargo",
        tshirt: "Camiseta Gráfica",
        basic: "Sudadera Básica",
        jeans: "Vaqueros",
        plain: "Camiseta Básica",
        joggers: "Pantalones Deportivos"
    }
};

function setLanguage(lang) {
    localStorage.setItem("lang", lang);
    applyLanguage(lang);
}

function applyLanguage(lang) {
    const t = translations[lang];

    document.querySelector(".title").textContent = t.title;
    document.getElementById("search").placeholder = t.search;

    document.getElementById("nav-cart").textContent = t.cart;
    document.getElementById("nav-login").textContent = t.login;
    document.getElementById("nav-register").textContent = t.register;

    document.querySelectorAll("[data-key]").forEach(el => {
        const key = el.getAttribute("data-key");
        if (t[key]) el.textContent = t[key];
    });
}

const savedLang = localStorage.getItem("lang") || "en";
applyLanguage(savedLang);
</script>
