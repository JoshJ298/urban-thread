<script>
const searchInput = document.getElementById("search");
const categoryFilter = document.getElementById("categoryFilter");
const productCards = document.querySelectorAll(".product-card");

function filterProducts() {
    const query = searchInput.value.toLowerCase();
    const selectedCategory = categoryFilter.value;

    productCards.forEach(card => {
        const title = card.querySelector("h3").textContent.toLowerCase();
        const category = card.getAttribute("data-category");

        card.style.display =
            (title.includes(query) &&
            (selectedCategory === "all" || category === selectedCategory))
            ? "" : "none";
    });
}

searchInput.addEventListener("input", filterProducts);
categoryFilter.addEventListener("change", filterProducts);
</script>


<script>
const translations = {
    en: {
        title: "Women's Collection",
        search: "Search products...",
        view: "View",
        crop: "Crop Hoodie",
        leather: "Leather Jacket",
        jeans: "High Waist Jeans",
        oversized: "Oversized T-Shirt",
        dress: "Summer Dress",
        skirt: "Skirt",
        tank: "Tank Top",
        leggings: "Leggings"
    },
    es: {
        title: "Colección de Mujer",
        search: "Buscar productos...",
        view: "Ver",
        crop: "Sudadera corta",
        leather: "Chaqueta de cuero",
        jeans: "Vaqueros de cintura alta",
        oversized: "Camiseta oversize",
        dress: "Vestido de verano",
        skirt: "Falda",
        tank: "Camiseta sin mangas",
        leggings: "Leggings"
    }
};

function setLanguage(lang) {
    localStorage.setItem("lang", lang);
    applyLanguage(lang);
}

function applyLanguage(lang) {
    const t = translations[lang];

    document.querySelector(".title").textContent = t.title;
    document.getElementById("search").placeholder = t.search;

    document.querySelectorAll("[data-key]").forEach(el => {
        el.textContent = t[el.getAttribute("data-key")];
    });
}

applyLanguage(localStorage.getItem("lang") || "en");
</script>
